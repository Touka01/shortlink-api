openapi: 3.0.3
info:
  title: shortlink-api
  version: 1.0.0
  description: A small URL shortener with click analytics, custom aliases, and expiry.
servers:
  - url: http://localhost:3000
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is up
  /api/shorten:
    post:
      summary: Create a short link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  example: https://example.com/a/very/long/path
                customAlias:
                  type: string
                  example: launch
                expiresInDays:
                  type: integer
                  example: 30
      responses:
        "201":
          description: Link created
        "400":
          description: Invalid input
        "409":
          description: Alias already taken
        "429":
          description: Rate limit exceeded
  /api/stats/{code}:
    get:
      summary: Get analytics for a link
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Link statistics
        "404":
          description: Not found
  /{code}:
    get:
      summary: Redirect to the original URL
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to target
        "404":
          description: Not found
        "410":
          description: Link expired
